version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: thread_city_mysql
    restart: always
    environment:
      MYSQL_DATABASE: thread_city
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: thread_user
      MYSQL_PASSWORD: thread_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql # Tự động chạy schema khi khởi tạo

  redis:
    image: redis:7-alpine
    container_name: thread_city_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
