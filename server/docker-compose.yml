version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: thread_mysql
    restart: always
    environment:
      MYSQL_DATABASE: thread_city
      MYSQL_USER: thread_user
      MYSQL_PASSWORD: thread_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3308:3306" # Cổng 3308 khớp với file .env
    volumes:
      - mysql_data:/var/lib/mysql
      - ../Backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql # Nạp schema xịn từ thư mục Backend

  redis:
    image: redis:alpine
    container_name: thread_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
